name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject version into lovely.toml
        run: sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.value }}"/' lovely.toml

      - name: Build release zip
        run: |
          mkdir NoStickSnap
          cp lovely.toml README.md NoStickSnap/
          zip -r "NoStickSnap-${{ steps.version.outputs.value }}.zip" NoStickSnap

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "NoStickSnap-${{ steps.version.outputs.value }}.zip"
          generate_release_notes: true
